name: CMake CI



on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]



jobs:

  build:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Configure CMake

        run: cmake -H. -B_build -DCMAKE_INSTALL_PREFIX=_install



      - name: Build

        run: cmake --build _build



      - name: Install

        run: cmake --build _build --target install
